<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ham's website</title>
  <link rel="icon" type="image/jpeg" href="logo.jpg" />

  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Impact, "Arial Black", "Segoe UI", sans-serif;
      color: white;
      background: #050505;
      overflow: hidden;
    }

    .enter-screen {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: grid;
      place-items: center;
      overflow: hidden;
      background: #000;
      cursor: pointer;
      transition: opacity 0.9s ease, visibility 0.9s ease;
    }

    .enter-screen.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .enter-content {
      width: 100%;
      text-align: center;
      padding: 24px;
    }

    .intro-poster {
      width: min(94vw, 1500px);
      max-height: 78vh;
      object-fit: contain;
      display: block;
      margin: 0 auto;
      filter:
        drop-shadow(0 0 26px rgba(90, 130, 255, 0.55))
        drop-shadow(0 0 70px rgba(30, 60, 200, 0.35));
    }

    .press-any-key {
      width: min(58vw, 620px);
      margin: 18px auto 0;
      display: block;
      mix-blend-mode: screen;
      filter:
        drop-shadow(0 0 8px rgba(255,255,255,0.65))
        drop-shadow(0 0 24px rgba(150,170,255,0.45));
      animation: floatBlink 2.8s ease-in-out infinite;
    }

    @keyframes floatBlink {
      0%, 100% {
        opacity: 1;
        transform: translateY(0);
      }

      50% {
        opacity: 0.28;
        transform: translateY(-13px);
      }
    }

    .persona-screen {
      position: relative;
      min-height: 100vh;
      opacity: 0;
      transform: scale(1.04);
      transition: opacity 0.9s ease, transform 0.9s ease;
      background:
        linear-gradient(90deg, rgba(180,0,0,0.92) 0%, rgba(120,0,0,0.78) 32%, rgba(0,0,0,0.95) 55%),
        url("background2nd") center / cover no-repeat;
      overflow: hidden;
    }

    .persona-screen.active {
      opacity: 1;
      transform: scale(1);
    }

    .persona-screen::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        repeating-linear-gradient(
          -14deg,
          rgba(255,255,255,0.06) 0,
          rgba(255,255,255,0.06) 2px,
          transparent 2px,
          transparent 18px
        );
      opacity: 0.45;
    }

    .red-slab {
      position: absolute;
      inset: -12vh auto auto 34vw;
      width: 34vw;
      height: 130vh;
      background: #d00000;
      transform: rotate(14deg);
      box-shadow:
        -26px 0 0 black,
        28px 0 0 white,
        52px 0 0 black;
      z-index: 2;
    }

    .comic-panel {
      position: absolute;
      right: -7vw;
      top: -8vh;
      width: 46vw;
      height: 116vh;
      background:
        radial-gradient(circle, black 0 4px, transparent 5px) 0 0 / 24px 24px,
        repeating-linear-gradient(45deg, white 0 16px, #d9d9d9 16px 30px);
      border-left: 18px solid black;
      transform: rotate(5deg);
      z-index: 1;
      opacity: 0.95;
    }

    .ham-character {
      position: absolute;
      right: 0;
      bottom: -6vh;
      width: min(48vw, 780px);
      max-height: 105vh;
      object-fit: contain;
      z-index: 5;
      filter:
        grayscale(1)
        contrast(1.8)
        drop-shadow(-14px 14px 0 black)
        drop-shadow(0 0 12px white);
      transform: rotate(-4deg);
    }

    .menu-wrap {
      position: relative;
      z-index: 8;
      min-height: 100vh;
      width: min(720px, 96vw);
      padding: 76px 0 56px 64px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .menu-badge {
      width: fit-content;
      margin-bottom: 14px;
      padding: 7px 18px;
      color: black;
      background: white;
      border: 5px solid black;
      font-size: 20px;
      letter-spacing: 2px;
      text-transform: uppercase;
      transform: rotate(-5deg);
      box-shadow: 8px 8px 0 #d00000;
    }

    .main-title {
      margin: 0 0 24px;
      font-size: clamp(54px, 8vw, 118px);
      line-height: 0.78;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: white;
      transform: rotate(-4deg);
      text-shadow:
        6px 6px 0 black,
        12px 12px 0 #d00000;
    }

    .main-title span {
      display: block;
      color: #d00000;
      text-shadow:
        5px 5px 0 white,
        11px 11px 0 black;
    }

    .persona-menu {
      width: min(500px, 90vw);
      display: grid;
      gap: 8px;
      transform: rotate(-4deg);
    }

    .menu-item,
    .mute-button {
      position: relative;
      display: block;
      width: 100%;
      padding: 8px 22px 10px 34px;
      color: white;
      background: transparent;
      border: 0;
      text-align: left;
      text-decoration: none;
      font-family: Impact, "Arial Black", sans-serif;
      font-size: clamp(34px, 4vw, 58px);
      line-height: 0.92;
      letter-spacing: 2px;
      text-transform: uppercase;
      text-shadow:
        -4px -4px 0 black,
        4px -4px 0 black,
        -4px 4px 0 black,
        4px 4px 0 black,
        8px 8px 0 black;
      cursor: pointer;
      transition: transform 0.15s ease, color 0.15s ease;
    }

    .menu-item::before,
    .mute-button::before {
      content: "";
      position: absolute;
      left: -12px;
      top: 50%;
      width: 0;
      height: 0;
      border-top: 24px solid transparent;
      border-bottom: 24px solid transparent;
      border-left: 0;
      border-right: 34px solid #d00000;
      transform: translateY(-50%) scaleX(0);
      transform-origin: left;
      transition: transform 0.15s ease;
      filter: drop-shadow(5px 5px 0 black);
    }

    .menu-item::after,
    .mute-button::after {
      content: "";
      position: absolute;
      left: 10px;
      right: -30px;
      top: 18%;
      bottom: 10%;
      background: white;
      clip-path: polygon(0 20%, 88% 0, 100% 70%, 8% 100%);
      z-index: -1;
      opacity: 0;
      transform: scaleX(0.6);
      transform-origin: left;
      transition: opacity 0.15s ease, transform 0.15s ease;
      box-shadow: 10px 10px 0 #d00000;
    }

    .menu-item:hover,
    .menu-item.active,
    .mute-button:hover {
      color: black;
      transform: translateX(30px) rotate(2deg) scale(1.06);
      text-shadow:
        -3px -3px 0 white,
        3px -3px 0 white,
        -3px 3px 0 white,
        3px 3px 0 white,
        8px 8px 0 black;
    }

    .menu-item:hover::before,
    .menu-item.active::before,
    .mute-button:hover::before {
      transform: translateY(-50%) scaleX(1);
    }

    .menu-item:hover::after,
    .menu-item.active::after,
    .mute-button:hover::after {
      opacity: 1;
      transform: scaleX(1);
    }

    .bottom-line {
      position: absolute;
      left: 36px;
      bottom: 22px;
      z-index: 10;
      color: white;
      font-family: "Segoe UI", Arial, sans-serif;
      font-size: 12px;
      letter-spacing: 2px;
      text-transform: uppercase;
      text-shadow: 0 2px 8px black;
    }

    @media (max-width: 900px) {
      body {
        overflow-y: auto;
      }

      .menu-wrap {
        padding: 54px 22px 86px;
      }

      .comic-panel {
        right: -38vw;
        width: 88vw;
        opacity: 0.55;
      }

      .red-slab {
        left: 38vw;
        width: 46vw;
      }

      .ham-character {
        right: -34vw;
        width: 105vw;
        opacity: 0.45;
      }

      .persona-menu {
        width: 100%;
      }

      .press-any-key {
        width: min(82vw, 520px);
      }
    }
  </style>
</head>

<body>
  <section class="enter-screen" id="enterScreen">
    <div class="enter-content">
      <img class="intro-poster" src="HAMILTON (1).png" alt="Hamilton Shea intro" />
      <img class="press-any-key" src="press-any-key.png" alt="Press any key" />
    </div>
  </section>

  <main class="persona-screen" id="gameScreen">
    <div class="comic-panel"></div>
    <div class="red-slab"></div>
    <img class="ham-character" src="HAMILTON (1).png" alt="Hamilton Shea" />

    <section class="menu-wrap">
      <div class="menu-badge">Command Select</div>

      <h1 class="main-title">
        Ham
        <span>Menu</span>
      </h1>

      <nav class="persona-menu">
        <a class="menu-item active" href="#">About Me</a>
        <a class="menu-item" href="#">Projects</a>
        <a class="menu-item" href="resume.html">Resume</a>
        <a class="menu-item" href="#">Contact</a>
        <button class="mute-button" id="muteButton" type="button">Mute Music</button>
      </nav>
    </section>

    <div class="bottom-line">© 2026 Hamilton Shea</div>
  </main>

  <audio id="backgroundMusic" src="Resident Evil 6 Soundtrack - Main Theme Leon  Helena.mp3" preload="auto" loop></audio>
  <audio id="clickSound" src="click.mp3" preload="auto"></audio>

  <script>
    const enterScreen = document.getElementById("enterScreen");
    const gameScreen = document.getElementById("gameScreen");
    const clickSound = document.getElementById("clickSound");
    const backgroundMusic = document.getElementById("backgroundMusic");
    const muteButton = document.getElementById("muteButton");
    const menuItems = document.querySelectorAll(".menu-item");
    let entered = false;

    function playClick() {
      if (!entered) return;
      clickSound.currentTime = 0;
      clickSound.volume = 0.45;
      clickSound.play().catch(() => {});
    }

    function startMusic() {
      backgroundMusic.volume = 0.32;
      backgroundMusic.loop = true;
      backgroundMusic.play().catch(() => {});
    }

    function enterSite() {
      if (entered) return;
      entered = true;
      startMusic();
      enterScreen.classList.add("hidden");
      gameScreen.classList.add("active");
    }

    function toggleMusic() {
      playClick();
      backgroundMusic.muted = !backgroundMusic.muted;
      muteButton.textContent = backgroundMusic.muted ? "Unmute Music" : "Mute Music";
    }

    enterScreen.addEventListener("click", enterSite);

    window.addEventListener("keydown", () => {
      if (!entered) {
        enterSite();
      }
    });

    menuItems.forEach(item => {
      item.addEventListener("click", () => {
        playClick();
        menuItems.forEach(link => link.classList.remove("active"));
        item.classList.add("active");
      });
    });

    muteButton.addEventListener("click", toggleMusic);
  </script>
</body>
</html>
