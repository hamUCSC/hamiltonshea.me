<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ham's website</title>
  <link rel="icon" type="image/jpeg" href="logo.jpg" />

  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", "Trebuchet MS", Arial, sans-serif;
      color: white;
      background: #03040b;
      overflow-x: hidden;
    }

    .enter-screen {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: grid;
      place-items: center;
      overflow: hidden;
      background: #000;
      cursor: pointer;
      transition: opacity 0.9s ease, visibility 0.9s ease;
    }

    .enter-screen.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .enter-content {
      position: relative;
      z-index: 5;
      width: 100%;
      text-align: center;
      padding: 24px;
    }

    .intro-poster {
      width: min(94vw, 1500px);
      max-height: 78vh;
      object-fit: contain;
      display: block;
      margin: 0 auto;
      filter:
        drop-shadow(0 0 26px rgba(90, 130, 255, 0.55))
        drop-shadow(0 0 70px rgba(30, 60, 200, 0.35));
    }

    .press-any-key {
      width: min(58vw, 620px);
      margin: 18px auto 0;
      display: block;
      mix-blend-mode: screen;
      filter:
        drop-shadow(0 0 8px rgba(255,255,255,0.65))
        drop-shadow(0 0 24px rgba(150,170,255,0.45));
      animation: floatBlink 2.8s ease-in-out infinite;
    }

    @keyframes floatBlink {
      0% {
        opacity: 1;
        transform: translateY(0);
      }

      35% {
        opacity: 0.72;
        transform: translateY(-10px);
      }

      55% {
        opacity: 0.25;
        transform: translateY(-13px);
      }

      75% {
        opacity: 0.82;
        transform: translateY(-6px);
      }

      100% {
        opacity: 1;
        transform: translateY(0);
      }
    }

    body {
      background:
        radial-gradient(circle at 68% 44%, rgba(180, 0, 0, 0.26), transparent 30%),
        linear-gradient(to right, rgba(0, 0, 0, 0.97), rgba(0, 0, 0, 0.65), rgba(0, 0, 0, 0.94)),
        url("background2nd") center center / cover fixed no-repeat;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        repeating-linear-gradient(
          to bottom,
          rgba(255, 255, 255, 0.035) 0px,
          rgba(255, 255, 255, 0.035) 1px,
          transparent 1px,
          transparent 4px
        );
      mix-blend-mode: overlay;
      opacity: 0.42;
      z-index: 5;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at center, transparent 34%, rgba(0, 0, 0, 0.76) 100%);
      z-index: 4;
    }

    .persona-container {
      position: relative;
      z-index: 10;
      min-height: 100vh;
      padding: 46px 58px 34px;
      opacity: 0;
      transform: scale(1.02);
      transition: opacity 0.9s ease, transform 0.9s ease;
    }

    .persona-container.active {
      opacity: 1;
      transform: scale(1);
    }

    .ui-header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 22px;
      margin-bottom: 34px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.18);
      padding-bottom: 18px;
    }

    .status-indicator {
      color: #ff2a2a;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 4px;
      text-transform: uppercase;
      text-shadow: 0 0 14px rgba(255, 0, 0, 0.8);
    }

    .ui-header h1 {
      margin: 0;
      font-size: clamp(44px, 7vw, 96px);
      line-height: 0.86;
      font-weight: 800;
      letter-spacing: 6px;
      text-align: right;
      text-transform: uppercase;
      color: white;
      text-shadow:
        0 0 16px rgba(255, 255, 255, 0.2),
        0 6px 22px black;
    }

    .ui-header h1 span {
      display: block;
      color: #c40000;
      text-shadow:
        0 0 16px rgba(255, 0, 0, 0.75),
        0 5px 18px black;
    }

    .persona-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(230px, 1fr));
      gap: 18px;
      align-items: stretch;
    }

    .persona-card {
      position: relative;
      min-height: 520px;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.18);
      background:
        linear-gradient(145deg, rgba(120, 0, 0, 0.34), rgba(5, 5, 8, 0.92) 42%, rgba(0, 0, 0, 0.88));
      box-shadow:
        0 18px 50px rgba(0, 0, 0, 0.72),
        inset 0 1px 0 rgba(255, 255, 255, 0.12);
      transform: skewX(-4deg);
      transition: transform 0.22s ease, border-color 0.22s ease, box-shadow 0.22s ease;
    }

    .persona-card:hover,
    .persona-card.active {
      transform: skewX(-4deg) translateY(-10px);
      border-color: rgba(255, 255, 255, 0.6);
      box-shadow:
        0 0 38px rgba(190, 0, 0, 0.55),
        0 24px 60px rgba(0, 0, 0, 0.82);
    }

    .card-inner {
      height: 100%;
      display: grid;
      grid-template-rows: 1fr auto;
      transform: skewX(4deg);
    }

    .avatar-container {
      position: relative;
      overflow: hidden;
      min-height: 310px;
      background: #080808;
    }

    .avatar-container img {
      width: 100%;
      height: 100%;
      min-height: 310px;
      object-fit: cover;
      object-position: center top;
      display: block;
      filter: contrast(1.12) saturate(0.88);
      opacity: 0.9;
    }

    .avatar-container::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(to bottom, transparent 45%, rgba(0, 0, 0, 0.92)),
        radial-gradient(circle at 60% 30%, transparent 18%, rgba(0,0,0,0.48) 70%);
    }

    .persona-details {
      padding: 20px 22px 22px;
      background: rgba(0, 0, 0, 0.68);
    }

    .persona-details h2 {
      margin: 0 0 8px;
      font-size: 28px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: white;
      text-shadow: 0 0 14px rgba(255, 255, 255, 0.15), 0 4px 12px black;
    }

    .role {
      margin: 0 0 16px;
      color: #ff4a4a;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .stats {
      list-style: none;
      padding: 0;
      margin: 0 0 20px;
      color: #cfcfcf;
      font-size: 13px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .stats li {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      padding: 5px 0;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .stats span {
      color: white;
      font-weight: 700;
    }

    .select-btn,
    .mute-button {
      position: relative;
      display: block;
      width: 100%;
      padding: 12px 16px 12px 30px;
      color: #e5e5e5;
      text-decoration: none;
      font-size: 14px;
      letter-spacing: 2px;
      text-transform: uppercase;
      background:
        linear-gradient(to right, rgba(150, 0, 0, 0.72), rgba(20, 20, 20, 0.78), rgba(0, 0, 0, 0));
      border: 0;
      border-left: 3px solid rgba(210, 0, 0, 0.95);
      text-align: left;
      text-shadow: 0 2px 6px black;
      transition: 0.18s ease;
      cursor: pointer;
      font-family: inherit;
    }

    .select-btn::before,
    .mute-button::before {
      content: "";
      position: absolute;
      left: 11px;
      top: 50%;
      width: 7px;
      height: 7px;
      background: #d60000;
      transform: translateY(-50%) rotate(45deg);
      box-shadow: 0 0 10px rgba(255, 0, 0, 0.9);
    }

    .select-btn:hover,
    .mute-button:hover {
      color: white;
      padding-left: 38px;
      border-left-color: white;
      background:
        linear-gradient(to right, rgba(220, 0, 0, 0.82), rgba(35, 35, 35, 0.76), rgba(0, 0, 0, 0));
    }

    .bottom-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 20px;
      margin-top: 28px;
      color: #a7a7a7;
      font-size: 12px;
      letter-spacing: 1px;
      text-transform: uppercase;
      text-shadow: 0 2px 6px black;
    }

    .mute-button {
      width: auto;
      min-width: 178px;
    }

    @media (max-width: 980px) {
      .persona-container {
        padding: 34px 22px 28px;
      }

      .ui-header {
        display: block;
      }

      .ui-header h1 {
        margin-top: 12px;
        text-align: left;
      }

      .persona-grid {
        grid-template-columns: 1fr;
      }

      .persona-card,
      .persona-card:hover,
      .persona-card.active {
        transform: none;
      }

      .card-inner {
        transform: none;
      }

      .bottom-bar {
        flex-direction: column;
        align-items: flex-start;
      }

      .press-any-key {
        width: min(82vw, 520px);
      }
    }
  </style>
</head>

<body>
  <section class="enter-screen" id="enterScreen">
    <div class="enter-content">
      <img class="intro-poster" src="HAMILTON (1).png" alt="Hamilton Shea intro" />
      <img class="press-any-key" src="press-any-key.png" alt="Press any key" />
    </div>
  </section>

  <div class="persona-container" id="gameScreen">
    <header class="ui-header">
      <div class="status-indicator">SYSTEM ONLINE</div>
      <h1>SELECT <span>DESTINATION</span></h1>
    </header>

    <main class="persona-grid">
      <section class="persona-card active">
        <div class="card-inner">
          <div class="avatar-container">
            <img src="logo.jpg" alt="About Hamilton" />
          </div>
          <div class="persona-details">
            <h2>ABOUT</h2>
            <p class="role">CLASS: PROFILE</p>
            <ul class="stats">
              <li>PRODUCT <span>90%</span></li>
              <li>GAMING <span>95%</span></li>
            </ul>
            <a class="select-btn" href="#">Initialize</a>
          </div>
        </div>
      </section>

      <section class="persona-card">
        <div class="card-inner">
          <div class="avatar-container">
            <img src="banner.png" alt="Projects" />
          </div>
          <div class="persona-details">
            <h2>PROJECTS</h2>
            <p class="role">CLASS: ARCHIVE</p>
            <ul class="stats">
              <li>OPS <span>88%</span></li>
              <li>COMMUNITY <span>96%</span></li>
            </ul>
            <a class="select-btn" href="#">Initialize</a>
          </div>
        </div>
      </section>

      <section class="persona-card">
        <div class="card-inner">
          <div class="avatar-container">
            <img src="HAMILTON (1).png" alt="Resume and Contact" />
          </div>
          <div class="persona-details">
            <h2>RESUME</h2>
            <p class="role">CLASS: DOSSIER</p>
            <ul class="stats">
              <li>LEADERSHIP <span>92%</span></li>
              <li>PARTNERSHIPS <span>89%</span></li>
            </ul>
            <a class="select-btn" href="resume.html">Initialize</a>
          </div>
        </div>
      </section>
    </main>

    <div class="bottom-bar">
      <div>© 2026 HAMILTON SHEA</div>
      <button class="mute-button" id="muteButton" type="button">mute music</button>
    </div>
  </div>

  <audio id="backgroundMusic" src="Resident Evil 6 Soundtrack - Main Theme Leon  Helena.mp3" preload="auto" loop></audio>
  <audio id="clickSound" src="click.mp3" preload="auto"></audio>

  <script>
    const enterScreen = document.getElementById("enterScreen");
    const gameScreen = document.getElementById("gameScreen");
    const clickSound = document.getElementById("clickSound");
    const backgroundMusic = document.getElementById("backgroundMusic");
    const muteButton = document.getElementById("muteButton");
    const cards = document.querySelectorAll(".persona-card");
    let entered = false;

    function playClick() {
      if (!entered) return;
      clickSound.currentTime = 0;
      clickSound.volume = 0.45;
      clickSound.play().catch(() => {});
    }

    function startMusic() {
      backgroundMusic.volume = 0.32;
      backgroundMusic.loop = true;
      backgroundMusic.play().catch(() => {});
    }

    function enterSite() {
      if (entered) return;
      entered = true;
      startMusic();
      enterScreen.classList.add("hidden");
      gameScreen.classList.add("active");
    }

    function toggleMusic() {
      playClick();
      backgroundMusic.muted = !backgroundMusic.muted;
      muteButton.textContent = backgroundMusic.muted ? "unmute music" : "mute music";
    }

    enterScreen.addEventListener("click", enterSite);

    window.addEventListener("keydown", () => {
      if (!entered) {
        enterSite();
      }
    });

    cards.forEach(card => {
      card.addEventListener("click", () => {
        playClick();
        cards.forEach(item => item.classList.remove("active"));
        card.classList.add("active");
      });
    });

    document.querySelectorAll(".select-btn").forEach(item => {
      item.addEventListener("click", playClick);
    });

    muteButton.addEventListener("click", toggleMusic);
  </script>
</body>
</html>
